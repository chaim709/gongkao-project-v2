# 公考管理系统 - 定时任务配置
# 安装方法: crontab deploy/crontab.conf

# 每天凌晨 2 点自动备份数据库
0 2 * * * cd ~/gongkao-project && COMPOSE_FILE=docker-compose.yml ENV_FILE=.env ./deploy.sh backup >> ~/gongkao-backups/backup.log 2>&1

# 每 5 分钟健康检查（可选）
# */5 * * * * curl -sf http://localhost:8888/health > /dev/null || (cd ~/gongkao-project && COMPOSE_FILE=docker-compose.yml ENV_FILE=.env ./deploy.sh restart)
